<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShadowX - Gamer Card</title>
    <!-- Google Fonts: Orbitron for futuristic headers, Inter for clean UI text -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Orbitron:wght@500;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #00ffff;
            --secondary: #ff007f;
            --bg-start: #080710;
            --bg-end: #0f172a;
            --card-bg: rgba(15, 23, 42, 0.45);
            --card-border: rgba(0, 255, 255, 0.15);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent-glow: rgba(0, 255, 255, 0.3);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: radial-gradient(circle at 50% 50%, #1e1b4b 0%, var(--bg-start) 100%);
            overflow: hidden;
            position: relative;
        }

        /* Ambient background glow effects */
        body::before, body::after {
            content: '';
            position: absolute;
            width: 400px;
            height: 400px;
            border-radius: 50%;
            filter: blur(120px);
            opacity: 0.15;
            z-index: 0;
        }
        body::before {
            background: var(--primary);
            top: 10%;
            left: 15%;
        }
        body::after {
            background: var(--secondary);
            bottom: 10%;
            right: 15%;
        }

        .card-container {
            position: relative;
            z-index: 1;
        }

        /* Glassmorphic card styling */
        .card {
            width: 380px;
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--card-border);
            border-radius: 24px;
            padding: 35px 30px;
            text-align: center;
            color: var(--text-main);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5), 
                        0 0 40px rgba(0, 255, 255, 0.05);
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            overflow: hidden;
        }

        /* Glow effect on hover */
        .card:hover {
            transform: translateY(-8px) scale(1.02);
            border-color: rgba(255, 0, 127, 0.4);
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.6), 
                        0 0 50px rgba(255, 0, 127, 0.15),
                        0 0 20px rgba(0, 255, 255, 0.1);
        }

        /* Cybernetic card header decorative lines */
        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 120px;
            height: 4px;
            background: linear-gradient(90deg, transparent, var(--primary), var(--secondary), transparent);
            border-radius: 0 0 4px 4px;
        }

        /* Profile image area with double-ring glowing animations */
        .profile-wrapper {
            position: relative;
            width: 140px;
            height: 140px;
            margin: 0 auto 20px;
        }

        .profile-ring {
            position: absolute;
            top: -6px;
            left: -6px;
            right: -6px;
            bottom: -6px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            z-index: 1;
            animation: rotate-ring 6s linear infinite;
        }

        .profile-ring::after {
            content: '';
            position: absolute;
            top: 2px;
            left: 2px;
            right: 2px;
            bottom: 2px;
            background: #0f172a;
            border-radius: 50%;
        }

        .profile {
            position: relative;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid #0f172a;
            z-index: 2;
            transition: transform 0.5s ease;
        }

        .card:hover .profile {
            transform: scale(1.05);
        }

        /* Header typography styling */
        h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 32px;
            font-weight: 900;
            letter-spacing: 2px;
            background: linear-gradient(135deg, #ffffff 30%, #a5f3fc 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-top: 10px;
            text-shadow: 0 0 20px rgba(0, 255, 255, 0.2);
        }

        .rank {
            font-family: 'Orbitron', sans-serif;
            color: var(--secondary);
            font-size: 14px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 3px;
            margin: 8px 0 25px 0;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            animation: pulse-rank 2s infinite ease-in-out;
        }

        /* Stats Section */
        .stats {
            display: flex;
            justify-content: space-between;
            gap: 12px;
            margin: 25px 0;
        }

        .stat {
            background: rgba(30, 41, 59, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 16px 10px;
            border-radius: 16px;
            flex: 1;
            transition: all 0.3s ease;
            position: relative;
        }

        .stat:hover {
            background: rgba(30, 41, 59, 0.8);
            border-color: rgba(0, 255, 255, 0.2);
            transform: translateY(-4px);
        }

        .stat h3 {
            font-family: 'Orbitron', sans-serif;
            font-size: 20px;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 4px;
        }

        .stat p {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
            font-weight: 600;
        }

        /* Interactive Follow Button */
        .btn {
            display: block;
            width: 100%;
            margin-top: 25px;
            padding: 14px 28px;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            color: #080710;
            text-decoration: none;
            border-radius: 30px;
            font-family: 'Orbitron', sans-serif;
            font-weight: 900;
            font-size: 16px;
            letter-spacing: 2px;
            text-transform: uppercase;
            transition: all 0.3s ease;
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.3);
            border: none;
            cursor: pointer;
            position: relative;
            z-index: 1;
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, var(--secondary), var(--primary));
            border-radius: 30px;
            opacity: 0;
            z-index: -1;
            transition: opacity 0.3s ease;
        }

        .btn:hover {
            color: #ffffff;
            box-shadow: 0 0 30px rgba(255, 0, 127, 0.5);
            transform: translateY(-2px);
        }

        .btn:hover::before {
            opacity: 1;
        }

        .btn:active {
            transform: translateY(0);
        }

        /* Audio/Visual decorative indicators */
        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid rgba(16, 185, 129, 0.2);
            color: #10b981;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-bottom: 15px;
        }

        .status-dot {
            width: 6px;
            height: 6px;
            background: #10b981;
            border-radius: 50%;
            animation: status-ping 1.5s infinite alternate;
        }

        /* Keyframe Animations */
        @keyframes rotate-ring {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @keyframes pulse-rank {
            0%, 100% { opacity: 0.8; text-shadow: 0 0 10px rgba(255, 0, 127, 0.3); }
            50% { opacity: 1; text-shadow: 0 0 20px rgba(255, 0, 127, 0.6); }
        }

        @keyframes status-ping {
            0% { transform: scale(0.8); opacity: 0.5; }
            100% { transform: scale(1.2); opacity: 1; box-shadow: 0 0 8px #10b981; }
        }
    </style>
</head>
<body>

    <div class="card-container">
        <div class="card">
            <div class="status-badge">
                <span class="status-dot"></span>
                Online
            </div>

            <div class="profile-wrapper">
                <div class="profile-ring"></div>
                <img src="profile.png" alt="ShadowX Profile Avatar" class="profile">
            </div>

            <h1>ShadowX</h1>
            <p class="rank">🎮 Pro Gamer | Level 99</p>

            <div class="stats">
                <div class="stat">
                    <h3>250</h3>
                    <p>Wins</p>
                </div>

                <div class="stat">
                    <h3>4.8</h3>
                    <p>K/D</p>
                </div>

                <div class="stat">
                    <h3>1200</h3>
                    <p>Hours</p>
                </div>
            </div>

            <button class="btn" onclick="followGamer()">Follow</button>
        </div>
    </div>

    <script>
        function followGamer() {
            const btn = document.querySelector('.btn');
            if (btn.innerText === 'FOLLOW') {
                btn.innerText = 'FOLLOWING';
                btn.style.background = 'transparent';
                btn.style.border = '2px solid var(--primary)';
                btn.style.color = 'var(--primary)';
                btn.style.boxShadow = 'none';
            } else {
                btn.innerText = 'FOLLOW';
                btn.style.background = 'linear-gradient(90deg, var(--primary), var(--secondary))';
                btn.style.border = 'none';
                btn.style.color = '#080710';
                btn.style.boxShadow = '0 0 20px rgba(0, 255, 255, 0.3)';
            }
        }
    </script>
</body>
</html>
