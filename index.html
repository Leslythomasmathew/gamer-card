<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lee - Gamer Card</title>
    <!-- Google Fonts: Orbitron for futuristic headers, Inter for clean UI text -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Orbitron:wght@500;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #00ffcc; /* Cyber mint */
            --secondary: #0088ff; /* Cyber blue */
            --bg-start: #000000;
            --bg-end: #0a0a0a;
            --card-bg: rgba(18, 18, 18, 0.85);
            --card-border: rgba(255, 255, 255, 0.08);
            --text-main: #ffffff;
            --text-muted: #888888;
            --accent-glow: rgba(0, 255, 204, 0.2);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: radial-gradient(circle at 50% 50%, #0f0f0f 0%, var(--bg-start) 100%);
            overflow: hidden;
            position: relative;
        }

        /* Ambient background glow effects - very subtle stealth black theme */
        body::before, body::after {
            content: '';
            position: absolute;
            width: 450px;
            height: 450px;
            border-radius: 50%;
            filter: blur(150px);
            opacity: 0.08;
            z-index: 0;
        }
        body::before {
            background: var(--primary);
            top: 20%;
            left: 20%;
        }
        body::after {
            background: var(--secondary);
            bottom: 20%;
            right: 20%;
        }

        .card-container {
            position: relative;
            z-index: 1;
        }

        /* Matte black glassmorphic card styling */
        .card {
            width: 380px;
            background: var(--card-bg);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid var(--card-border);
            border-radius: 24px;
            padding: 35px 30px;
            text-align: center;
            color: var(--text-main);
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.8), 
                        0 0 50px rgba(0, 255, 204, 0.03);
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            overflow: hidden;
        }

        /* Glow effect on hover */
        .card:hover {
            transform: translateY(-8px) scale(1.02);
            border-color: rgba(0, 255, 204, 0.3);
            box-shadow: 0 35px 70px rgba(0, 0, 0, 0.9), 
                        0 0 40px rgba(0, 255, 204, 0.1);
        }

        /* Cybernetic card header decorative line */
        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 140px;
            height: 3px;
            background: linear-gradient(90deg, transparent, var(--primary), transparent);
            border-radius: 0 0 3px 3px;
        }

        /* Profile image area with double-ring glowing animations */
        .profile-wrapper {
            position: relative;
            width: 140px;
            height: 140px;
            margin: 0 auto 20px;
        }

        .profile-ring {
            position: absolute;
            top: -6px;
            left: -6px;
            right: -6px;
            bottom: -6px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            z-index: 1;
            animation: rotate-ring 8s linear infinite;
        }

        .profile-ring::after {
            content: '';
            position: absolute;
            top: 2px;
            left: 2px;
            right: 2px;
            bottom: 2px;
            background: #0d0d0d;
            border-radius: 50%;
        }

        .profile {
            position: relative;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid #0d0d0d;
            z-index: 2;
            transition: transform 0.5s ease;
        }

        .card:hover .profile {
            transform: scale(1.04);
        }

        /* Header typography styling */
        h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 36px;
            font-weight: 900;
            letter-spacing: 3px;
            background: linear-gradient(135deg, #ffffff 40%, #a5f3fc 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-top: 10px;
            text-shadow: 0 0 15px rgba(255, 255, 255, 0.1);
        }

        .subtitle {
            font-size: 12px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin: 8px 0 25px 0;
            line-height: 1.6;
            font-weight: 600;
        }

        /* Stats Section */
        .stats {
            display: flex;
            justify-content: space-between;
            gap: 12px;
            margin: 25px 0;
        }

        .stat {
            background: rgba(25, 25, 25, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.03);
            padding: 16px 10px;
            border-radius: 16px;
            flex: 1;
            transition: all 0.3s ease;
        }

        .stat:hover {
            background: rgba(35, 35, 35, 0.9);
            border-color: rgba(0, 255, 204, 0.15);
            transform: translateY(-4px);
        }

        .stat h3 {
            font-family: 'Orbitron', sans-serif;
            font-size: 20px;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 4px;
        }

        .stat p {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
            font-weight: 700;
        }

        /* Buttons Section */
        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 25px;
        }

        .btn {
            display: block;
            width: 100%;
            padding: 14px 28px;
            font-family: 'Orbitron', sans-serif;
            font-weight: 900;
            font-size: 14px;
            letter-spacing: 2px;
            text-transform: uppercase;
            transition: all 0.3s ease;
            border-radius: 30px;
            cursor: pointer;
        }

        .btn-status {
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            color: #000000;
            border: none;
            box-shadow: 0 0 20px rgba(0, 255, 204, 0.2);
        }

        .btn-status:hover {
            box-shadow: 0 0 30px rgba(0, 255, 204, 0.4);
            transform: translateY(-2px);
        }

        .btn-follow {
            background: transparent;
            color: var(--text-main);
            border: 1px solid rgba(255, 255, 255, 0.15);
        }

        .btn-follow:hover {
            border-color: var(--primary);
            color: var(--primary);
            background: rgba(0, 255, 204, 0.03);
            transform: translateY(-2px);
        }

        /* Dynamic Status Panel */
        .status-panel {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.4s cubic-bezier(0.4, 0, 0.2, 1), margin-top 0.4s ease, padding 0.4s ease;
            background: rgba(0, 0, 0, 0.5);
            border-radius: 16px;
            border: 1px solid transparent;
            text-align: left;
            padding: 0 15px;
        }

        .status-panel.active {
            max-height: 250px;
            margin-top: 20px;
            padding: 20px;
            border-color: rgba(255, 255, 255, 0.05);
            box-shadow: inset 0 0 15px rgba(0, 0, 0, 0.6);
        }

        .status-panel h4 {
            font-family: 'Orbitron', sans-serif;
            font-size: 14px;
            font-weight: 700;
            letter-spacing: 1px;
            color: var(--primary);
            margin-bottom: 12px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding-bottom: 6px;
            text-transform: uppercase;
        }

        .status-info {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .status-row {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
        }

        .status-label {
            color: var(--text-muted);
        }

        .status-val {
            color: var(--text-main);
            font-weight: 600;
        }

        .status-live {
            color: #10b981;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .status-live-dot {
            width: 6px;
            height: 6px;
            background: #10b981;
            border-radius: 50%;
            animation: ping 1.2s infinite alternate;
        }

        /* Keyframe Animations */
        @keyframes rotate-ring {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @keyframes ping {
            0% { transform: scale(0.8); opacity: 0.5; }
            100% { transform: scale(1.3); opacity: 1; box-shadow: 0 0 6px #10b981; }
        }
    </style>
</head>
<body>

    <div class="card-container">
        <div class="card">
            <div class="profile-wrapper">
                <div class="profile-ring"></div>
                <img src="profile.png" alt="Lee Profile Avatar" class="profile">
            </div>

            <h1>Lee</h1>
            <p class="subtitle">PUBG, Call of Duty,<br>Free Fire Player</p>

            <div class="stats">
                <div class="stat">
                    <h3>250</h3>
                    <p>Wins</p>
                </div>

                <div class="stat">
                    <h3>4.8</h3>
                    <p>K/D</p>
                </div>

                <div class="stat">
                    <h3>1200</h3>
                    <p>Hours</p>
                </div>
            </div>

            <div class="btn-group">
                <button class="btn btn-status" onclick="toggleStatus()">View Status</button>
                <button class="btn btn-follow" onclick="toggleFollow()">Follow</button>
            </div>

            <div class="status-panel" id="statusPanel">
                <h4>Gaming Profile Status</h4>
                <div class="status-info">
                    <div class="status-row">
                        <span class="status-label">Current Status:</span>
                        <span class="status-val status-live">
                            <span class="status-live-dot"></span>
                            In-Game (Live)
                        </span>
                    </div>
                    <div class="status-row">
                        <span class="status-label">Active Game:</span>
                        <span class="status-val">PUBG Mobile</span>
                    </div>
                    <div class="status-row">
                        <span class="status-label">Match Mode:</span>
                        <span class="status-val">Ranked Squads</span>
                    </div>
                    <div class="status-row">
                        <span class="status-label">Server Region:</span>
                        <span class="status-val">Asia</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function toggleStatus() {
            const panel = document.getElementById('statusPanel');
            const btn = document.querySelector('.btn-status');
            
            panel.classList.toggle('active');
            if (panel.classList.contains('active')) {
                btn.innerText = 'Hide Status';
            } else {
                btn.innerText = 'View Status';
            }
        }

        function toggleFollow() {
            const btn = document.querySelector('.btn-follow');
            if (btn.innerText === 'FOLLOW') {
                btn.innerText = 'FOLLOWING';
                btn.style.borderColor = 'var(--primary)';
                btn.style.color = '#000000';
                btn.style.background = 'var(--primary)';
            } else {
                btn.innerText = 'FOLLOW';
                btn.style.borderColor = 'rgba(255, 255, 255, 0.15)';
                btn.style.color = 'var(--text-main)';
                btn.style.background = 'transparent';
            }
        }
    </script>
</body>
</html>
